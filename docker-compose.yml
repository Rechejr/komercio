version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: komercio_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: komercio
      POSTGRES_PASSWORD: komercio_secret
      POSTGRES_DB: komercio_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U komercio"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: komercio_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: komercio_backend
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://komercio:komercio_secret@postgres:5432/komercio_db
      REDIS_URL: redis://redis:6379
      JWT_SECRET: change_this_in_production_super_secret
      JWT_REFRESH_SECRET: change_this_refresh_secret_in_production
      CORS_ORIGIN: http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - backend_logs:/app/logs

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: komercio_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1
      NEXT_PUBLIC_SOCKET_URL: http://localhost:4000
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  backend_logs:
